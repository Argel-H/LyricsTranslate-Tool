<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/x-icon" href="/public/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LyricsTranslate Tool</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"
            rel="stylesheet"
        />
        <style>
            .app-preloader {
                position: fixed; inset: 0; display: flex; flex-direction: column;
                align-items: center; justify-content: center; gap: 1.5rem;
                background: rgb(32, 31, 35); z-index: 9999;
                font-family: 'Plus Jakarta Sans', sans-serif; color: rgb(202, 196, 208);
            }
            .app-preloader .logo {
                width: 4rem; height: 4rem; border-radius: 1rem;
                background: rgb(208, 188, 255); color: rgb(55, 38, 94);
                display: flex; align-items: center; justify-content: center;
                font-size: 1.5rem; font-weight: 800;
            }
            .app-preloader .spinner {
                width: 2rem; height: 2rem; border: 3px solid rgba(208,188,255,0.2);
                border-top-color: rgb(208, 188, 255); border-radius: 50%;
                animation: app-spin 0.8s linear infinite;
            }
            .app-preloader .text {
                font-size: 0.9rem; color: rgb(202, 196, 208); opacity: 0.7; font-family: 'Inter', sans-serif;
            }
            @keyframes app-spin { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="app-preloader">
                <div class="logo">L</div>
                <div class="spinner"></div>
                <div class="text">Loading...</div>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
